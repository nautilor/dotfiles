# Basic window & workspace interactions
bind = SUPER SHIFT, Q, killactive
bind = SUPER, K, exec, hyprctl kill
bind = SUPER CTRL, C, centerwindow
bind = SUPER, S, swapnext
bind = SUPER, F, fullscreen, 1
bind = SUPER SHIFT, F, fullscreen, 2

bind = SUPER, LEFT, movefocus, l
bind = SUPER, RIGHT, movefocus, r
bind = SUPER, UP, movefocus, u
bind = SUPER, DOWN, movefocus, d
bind = SUPER, H, movefocus, l
bind = SUPER, L, movefocus, r
bind = SUPER, K, movefocus, u
bind = SUPER, J, movefocus, d

bind = SUPER SHIFT, LEFT, movewindoworgroup, l
bind = SUPER SHIFT, RIGHT, movewindoworgroup, r
bind = SUPER SHIFT, UP, movewindoworgroup, u
bind = SUPER SHIFT, DOWN, movewindoworgroup, d
bind = SUPER SHIFT, H, movewindoworgroup, l
bind = SUPER SHIFT, L, movewindoworgroup, r
bind = SUPER SHIFT, K, movewindoworgroup, u
bind = SUPER SHIFT, J, movewindoworgroup, d

bind = SUPER, 1, exec, ~/.config/hypr/bin/workspace_focus q
bind = SUPER, 2, exec, ~/.config/hypr/bin/workspace_focus w
bind = SUPER, 3, exec, ~/.config/hypr/bin/workspace_focus e
bind = SUPER, 4, exec, ~/.config/hypr/bin/workspace_focus r
bind = SUPER, 5, exec, ~/.config/hypr/bin/workspace_focus t
bind = SUPER, Q, exec, ~/.config/hypr/bin/workspace_focus q
bind = SUPER, W, exec, ~/.config/hypr/bin/workspace_focus w
bind = SUPER, E, exec, ~/.config/hypr/bin/workspace_focus e
bind = SUPER, R, exec, ~/.config/hypr/bin/workspace_focus r
bind = SUPER, T, exec, ~/.config/hypr/bin/workspace_focus t

bind = SUPER CTRL, 1, exec, ~/.config/hypr/bin/workspace_move q
bind = SUPER CTRL, 2, exec, ~/.config/hypr/bin/workspace_move w
bind = SUPER CTRL, 3, exec, ~/.config/hypr/bin/workspace_move e
bind = SUPER CTRL, 4, exec, ~/.config/hypr/bin/workspace_move r
bind = SUPER CTRL, 5, exec, ~/.config/hypr/bin/workspace_move t
bind = SUPER CTRL, Q, exec, ~/.config/hypr/bin/workspace_move q
bind = SUPER CTRL, W, exec, ~/.config/hypr/bin/workspace_move w
bind = SUPER CTRL, E, exec, ~/.config/hypr/bin/workspace_move e
bind = SUPER CTRL, R, exec, ~/.config/hypr/bin/workspace_move r
bind = SUPER CTRL, T, exec, ~/.config/hypr/bin/workspace_move t

bind = SUPER CTRL, h,     resizeactive, -60   0
bind = SUPER CTRL, j,     resizeactive,   0  60
bind = SUPER CTRL, k,     resizeactive,   0 -60
bind = SUPER CTRL, l,     resizeactive,  60   0
bind = SUPER CTRL, left,  resizeactive, -60   0
bind = SUPER CTRL, right, resizeactive,  60   0
bind = SUPER CTRL, up,    resizeactive,   0 -60
bind = SUPER CTRL, down,  resizeactive,   0  60


# Interactions with groups
# bind = SUPER, TAB, changegroupactive, f
# bind = SUPER, N, changegroupactive, f
# bind = SUPER, M, changegroupactive, b
# bind = SUPER, J, togglegroup

# Basic interactions between monitors
bind = SUPER, BACKSPACE, focusmonitor, +1
bind = SUPER CTRL, BACKSPACE, movewindow, mon:+1

# Programs
bind = SUPER, RETURN, exec, kitty 
bind = SUPER SHIFT, D, exec, rofi -show run -theme application
bind = SUPER SHIFT, M, exec, hyprlock

# Media
bind = SUPER, P, togglespecialworkspace
bind = SUPER CTRL, P, movetoworkspacesilent, special 
bind = SUPER SHIFT, P, exec, playerctl -p spotify play-pause
bind = SUPER SHIFT, I, exec, playerctl -p spotify previous
bind = SUPER SHIFT, O, exec, playerctl -p spotify next

# Script
bind = SUPER, D, exec, ~/.config/hypr/bin/launcher.sh
bind = SUPER CTRL, D, exec, ~/.config/hypr/bin/fzf_utilities.sh --indipendent
# Screenshot
bind = SUPER SHIFT, S, exec, ~/.config/hypr/bin/screenshot.sh
bind = , Print, exec, ~/.config/hypr/bin/screenshot.sh
# Color picker to clipboard
bind = SUPER, F11, exec, ~/.config/hypr/bin/colorpicker.sh
# Color picker to editor
bind = SUPER CTRL, F11, exec, ~/.config/hypr/bin/colorpicker.sh editor
bind = SUPER SHIFT, X, exec, ~/.config/hypr/bin/powermenu.sh 
bind = SUPER CTRL, X, exec, ~/.config/hypr/bin/powermenu.sh 
bind = , XF86PowerOff, exec, ~/.config/hypr/bin/powermenu.sh
bind = SUPER, C, exec, ~/.config/hypr/bin/floating.sh
bind = SUPER CTRL, M, exec, ~/.config/hypr/bin/caffeine.sh toggle 
bind = SUPER, V, exec, ~/.config/hypr/bin/clipboard.sh
bind = SUPER SHIFT, V, exec, ~/.config/hypr/bin/clipboard.sh clear
bind = SUPER, B, exec, ~/.config/hypr/bin/focus_mode.sh
bind = SUPER SHIFT, R, exec, ~/.config/hypr/bin/recorder.sh
bind = SUPER, A, exec, ~/.config/hypr/bin/rofi_sessions
bind = SUPER CTRL, B, exec, pkill -USR1 waybar
bind = SUPER, I, exec, ~/.config/hypr/bin/hints.sh 

# Volume Control
bind = SUPER, bracketleft, exec, swayosd-client --output-volume lower
bind = SUPER, bracketright, exec, swayosd-client --output-volume raise
bind = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise 
bind = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower 
bind = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle

# Microphone Control
bind= , XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bind = SUPER CTRL, S, exec, swayosd-client --input-volume mute-toggle
# bind = SUPER CTRL, S, exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle

# Brightness Control
bind= , XF86MonBrightnessDown, exec, swayosd-client --brightness lower
bind= , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bind = SUPER, period, exec, swayosd-client --brightness raise
bind = SUPER, comma, exec, swayosd-client --brightness lower


# focus windows
bind = SUPER, F1, exec, ~/.config/hypr/bin/focus_by_class.sh kitty
bind = SUPER, F2, exec, ~/.config/hypr/bin/focus_by_class.sh "zen||google-chrome"
