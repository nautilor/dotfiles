general {
	gaps_in = 5
	gaps_out = 10
	border_size = 1
	col.active_border = rgba(23,35,42,1)
	col.inactive_border = rgba(12,12,12,1)
	resize_on_border = true
	allow_tearing = false
	layout = dwindle
}

render {
cm_sdr_eotf = 2
}

xwayland {
	force_zero_scaling = true
}


scrolling {

}


dwindle {
	pseudotile = true
	preserve_split = true
}

master {
	new_status = master
}

misc {
	vrr = 2
	on_focus_under_fullscreen = true
	force_default_wallpaper = false
	exit_window_retains_fullscreen = true
	focus_on_activate = true
	disable_hyprland_logo = true
}

binds {
	movefocus_cycles_fullscreen = true
}


plugin {
    hyprexpo {
        columns = 3
        gap_size = 5
        bg_col = rgb(111111)
        workspace_method = current # [center/first] [workspace] e.g. first 1 or center m+1

        gesture_distance = 300 # how far is the "max" for the gesture
    }
}
