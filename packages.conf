# =============================================================================
# Dotfiles package list
# Sections: [pacman], [aur], [stow]
# Lines starting with # are comments. Inline comments are also supported.
# =============================================================================

# ── Wayland compositor & Hyprland ecosystem ──────────────────────────────────
[pacman]
hyprland
hyprlock
hypridle
hyprsunset
hyprpicker
xdg-desktop-portal-hyprland
xdg-desktop-portal-gtk
polkit-gnome

# ── Status bar ────────────────────────────────────────────────────────────────
[pacman]
waybar

[aur]
swaync
swayosd

# ── Wallpaper ─────────────────────────────────────────────────────────────────
[aur]
swww

# ── App launcher & desktop overlays ──────────────────────────────────────────
[pacman]
rofi-wayland

[aur]
quickshell-git

# ── Screenshot, recording & color picker ─────────────────────────────────────
[pacman]
grim
slurp
wf-recorder
imagemagick

[aur]
hyprshot
satty

# ── Clipboard ─────────────────────────────────────────────────────────────────
[pacman]
wl-clipboard

[aur]
clipse
wl-clip-persist

# ── Audio (PipeWire) ──────────────────────────────────────────────────────────
[pacman]
pipewire
pipewire-pulse
pipewire-alsa
wireplumber

[aur]
wiremix

# ── Networking & Bluetooth ────────────────────────────────────────────────────
[pacman]
networkmanager
network-manager-applet
blueman
bluez
bluez-utils

[aur]
bluetui

# ── System control ────────────────────────────────────────────────────────────
[pacman]
playerctl
brightnessctl
libnotify

# ── Qt theming (QT_QPA_PLATFORMTHEME, QT_STYLE_OVERRIDE in environment.conf) ──
[pacman]
qt5ct
kvantum
kvantum-qt5

# ── Cursor theme (HYPRCURSOR_THEME = Catppuccin Mocha Dark) ───────────────────
[aur]
hyprcursor-catppuccin-mocha-dark-git

# ── Terminal & multiplexer ────────────────────────────────────────────────────
[pacman]
kitty
tmux

# ── Zsh shell ─────────────────────────────────────────────────────────────────
[pacman]
zsh

# ── CLI utilities ─────────────────────────────────────────────────────────────
[pacman]
fzf
fd
bat
eza
lazygit
yazi
zathura
zathura-pdf-mupdf
git
jq

# ── Spotify ───────────────────────────────────────────────────────────────────
[aur]
spotify-launcher

# ── Neovim ────────────────────────────────────────────────────────────────────
[pacman]
neovim

# ── Development runtimes (for Neovim LSPs & formatters via Mason) ─────────────
[pacman]
nodejs
npm
python
python-pip
rustup
clang
jdk21-openjdk
go
qt6-tools    # provides qmlls (QML language server)

# ── Fonts ─────────────────────────────────────────────────────────────────────
[pacman]
ttf-jetbrains-mono-nerd
noto-fonts
noto-fonts-emoji
ttf-roboto

# ── GNU Stow ──────────────────────────────────────────────────────────────────
[pacman]
stow

# =============================================================================
# Stow packages (top-level directories to symlink into $HOME)
# =============================================================================
[stow]
hypr
kitty
nvim
tmux
zsh
waybar
swaync
swayosd
rofi
lazygit
yazi
zathura
ideavim
fd
fzutils
quickshell
